<!DOCTYPE html>
<html>
<head>
<title>WS Test Mini</title>
</head>
<body>
<h3>Test WebSocket</h3>
<div id="out" style="font-family:monospace;background:#111;color:#0f0;padding:10px;min-height:200px"></div>
<script>
function log(m){document.getElementById('out').innerHTML+=m+'<br>';}
let ws;
function doConnect(){
  log('Connecting...');
  ws=new WebSocket('ws://43.156.57.226/ws');
  ws.onopen=()=>{log('OPEN');setTimeout(()=>{log('Sending /start...');ws.send(JSON.stringify({type:'chat',message:'/start'}));},300);};
  ws.onmessage=(e)=>{log('MSG: '+e.data.substring(0,150));};
  ws.onerror=()=>log('ERROR');
  ws.onclose=()=>log('CLOSE');
}
doConnect();
</script>
</body>
</html>
