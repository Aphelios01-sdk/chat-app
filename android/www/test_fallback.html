<!DOCTYPE html>
<html><head><title>Test</title></head>
<body>
<h2>Test HTTP Fallback</h2>
<div id="out">Loading...</div>
<script>
fetch('/api/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: '/start'})
})
.then(r => r.json())
.then(d => {
    document.getElementById('out').innerHTML = 'OK: ' + JSON.stringify(d).substring(0, 200);
})
.catch(e => {
    document.getElementById('out').innerHTML = 'ERR: ' + e;
});
</script>
</body></html>
