<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#075E54">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Lambda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --wa-dark: #000000;
            --wa-header: #000000;
            --wa-header-light: #000000;
            --wa-accent: #FFFFFF;
            --wa-bg: #000000;
            --wa-bubble-sent: #FFFFFF;
            --wa-bubble-recv: #1A1A1A;
            --wa-input: #000000;
            --wa-text: #FFFFFF;
            --wa-text-dim: #888888;
            --wa-text-light: #FFFFFF;
            --wa-border: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'San Francisco', system-ui, sans-serif;
            background: var(--wa-bg);
            color: var(--wa-text);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            animation: fadeIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Header X Style */
        .header {
            background: var(--wa-header);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 1px 0 var(--wa-border);
            z-index: 10;
            flex-shrink: 0;
            min-height: 53px;
        }

        .header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #333333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
        }

        .header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-info {
            flex: 1;
        }

        .header-info .name {
            color: var(--wa-text);
            font-weight: 700;
            font-size: 15px;
        }

        .header-info .status {
            color: var(--wa-text-dim);
            font-size: 13px;
        }

        .header-actions {
            display: flex;
            gap: 20px;
        }

        .header-actions button {
            background: none;
            border: none;
            color: #888888;
            font-size: 12px;
            cursor: pointer;
            transition: color 0.2s;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .header-actions button:hover {
            color: #FFFFFF;
            background: #333333;
        }

        /* Back Button */
        .header-back {
            background: none;
            border: none;
            color: #FFFFFF;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            margin-right: 4px;
            border-radius: 50%;
            transition: background 0.2s;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .header-back.visible {
            display: flex;
        }

        .header-back:hover {
            background: rgba(255,255,255,0.1);
        }

        .header-back:active {
            background: rgba(255,255,255,0.2);
            transform: scale(0.95);
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 5px 0;
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-height: 0;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        /* Date Divider */
        .date-divider {
            text-align: center;
            margin: 12px 0;
        }

        .date-divider span {
            background: #1A1A1A;
            color: #888888;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid #333333;
        }

        /* Message Bubbles */
        .message-wrapper {
            display: flex;
            margin-bottom: 2px;
        }

        .message-wrapper.sent {
            justify-content: flex-end;
        }

        .message-wrapper.recv {
            justify-content: flex-start;
        }

        /* Choice Buttons */
        .choice-buttons {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            flex-wrap: wrap;
        }

        .choice-btn {
            background: #0b5ed7;
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .choice-btn:hover {
            background: #0a4cb8;
            transform: scale(1.05);
        }

        /* Streaming Message */
        .streaming-message {
            opacity: 0.9;
        }

        .streaming-message::after {
            content: '...';
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
            animation: messageIn 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            background: var(--wa-bubble-sent);
            border-top-right-radius: 4px;
            border-bottom-right-radius: 4px;
            border-bottom-left-radius: 16px;
            color: #111;
        }

        .message.recv {
            background: var(--wa-bubble-recv);
            border-top-left-radius: 4px;
            border-bottom-right-radius: 16px;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--wa-border);
        }

        .message .sender {
            font-size: 13px;
            font-weight: 600;
            color: var(--wa-accent);
            margin-bottom: 4px;
        }

        .message .text {
            margin-bottom: 2px;
        }

        .message .meta {
            display: flex;
            justify-content: flex-end;
            gap: 5px;
            font-size: 11px;
            color: var(--wa-text-dim);
            margin-top: 4px;
        }

        .message .meta .read-status {
            color: #FFFFFF;
        }

        .message .reply-quote {
            background: rgba(255,255,255,0.1);
            border-left: 3px solid var(--wa-accent);
            padding: 4px 8px;
            margin-bottom: 4px;
            border-radius: 4px;
            font-size: 13px;
            color: var(--wa-text-dim);
        }

        .message .reply-quote .reply-sender {
            font-weight: 600;
            color: var(--wa-accent);
            margin-bottom: 2px;
        }

        .message .reply-quote .reply-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 220px;
        }

        /* Reply Bar */
        .reply-bar {
            display: none;
            background: var(--wa-input);
            padding: 6px 12px 6px 50px;
            border-top: 1px solid var(--wa-border);
            font-size: 13px;
            color: var(--wa-text-dim);
            position: relative;
            min-height: 38px;
        }

        .reply-bar.active {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reply-bar .reply-label {
            color: var(--wa-accent);
            font-weight: 600;
            flex-shrink: 0;
        }

        .reply-bar .reply-content {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .reply-bar .reply-close {
            background: none;
            border: none;
            color: var(--wa-text-dim);
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            flex-shrink: 0;
        }

        /* Notification Sound */
        .notification-sound {
            display: none;
        }

        /* Typing Indicator */
            30% { transform: translateY(-4px); opacity: 1; }
        }

        /* Input Area */
        .input-area {
            background: #000000;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid #333333;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            box-sizing: border-box;
            overflow: visible;
        }

        /* Wrapper: contains emoji btn + textarea + send btn in one rounded box */
        .input-area .input-wrapper {
            display: flex;
            flex-direction: row;
            align-items: center;
            background: #1A1A1A;
            border-radius: 24px;
            border: 1px solid #333333;
            padding: 4px 6px;
            gap: 4px;
        }

        .input-area .emoji-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #888888;
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: color 0.2s, background 0.2s;
        }

        .input-area .emoji-btn:hover {
            color: #FFFFFF;
            background: rgba(255,255,255,0.1);
        }

        .input-area textarea {
            flex: 1;
            border: none;
            padding: 8px 4px;
            font-size: 15px;
            resize: none;
            outline: none;
            font-family: inherit;
            background: transparent;
            color: #FFFFFF;
            line-height: 1.4;
            max-height: 100px;
        }

        .input-area textarea::placeholder {
            color: #666666;
        }

        .input-area .send-btn {
            background: #FFFFFF;
            color: #000000;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .input-area .send-btn:hover {
            transform: scale(1.05);
        }

        .input-area .send-btn:active {
            transform: scale(0.92);
        }

        /* Skills Popup Menu */
        .skills-popup {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            max-height: 280px;
            background: #1A1A1A;
            border: 1px solid #333333;
            border-radius: 12px;
            overflow: hidden;
            z-index: 1000;
            display: none;
            flex-direction: column;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .skills-popup.active {
            display: flex;
            opacity: 1;
            transform: translateY(0) scale(1);
            transition: opacity 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .skills-popup-header {
            padding: 10px 12px;
            background: #0A0A0A;
            border-bottom: 1px solid #333333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .skills-popup-header span {
            font-size: 13px;
            font-weight: 600;
            color: #FFFFFF;
        }

        .skills-popup-close {
            background: none;
            border: none;
            color: #888888;
            font-size: 18px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .skills-popup-close:hover {
            color: #FFFFFF;
        }

        .skills-popup-list {
            overflow-y: auto;
            flex: 1;
        }

        .skills-popup-item {
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .skills-popup-item:hover {
            background: #2A2A2A;
        }

        .skills-popup-item:active {
            background: #3A3A3A;
        }

        .skills-popup-item:active {
            background: #333333;
        }

        .skills-popup-item .skill-info {
            flex: 1;
            min-width: 0;
        }

        .skills-popup-item .skill-name {
            font-size: 13px;
            font-weight: 500;
            color: #FFFFFF;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .skills-popup-item .skill-desc {
            font-size: 11px;
            color: #888888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .skills-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 999;
            display: none;
            transition: opacity 0.25s ease;
            opacity: 0;
        }

        .skills-popup-overlay.active {
            display: block;
            opacity: 1;
        }

        .skills-popup-loading {
            padding: 20px;
            text-align: center;
            color: #888888;
            font-size: 13px;
        }

        .skills-popup-error {
            padding: 20px;
            text-align: center;
            color: #FF4444;
            font-size: 13px;
        }

        /* Welcome Screen */
        .welcome-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            background: var(--wa-bg);
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 50;
        }

        .welcome-screen.hidden {
            animation: welcomeOut 0.25s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes welcomeOut {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
        }

        .welcome-screen .welcome-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #333333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 20px;
            object-fit: cover;
        }

        .welcome-screen h2 {
            color: var(--wa-text);
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .welcome-screen p {
            color: var(--wa-text-dim);
            font-size: 14px;
            margin-bottom: 25px;
            max-width: 300px;
            line-height: 1.5;
        }

        .welcome-screen .start-btn {
            background: #FFFFFF;
            color: #000000;
            border: none;
            padding: 12px 35px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .welcome-screen .start-btn:hover {
            background: #E6E6E6;
            transform: scale(1.05);
        }

        .welcome-screen .start-btn:active {
            transform: scale(0.98);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--wa-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--wa-border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--wa-text-dim);
        }

        /* PIN Lock Screen Grok Style - Full Black */
        .lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            will-change: opacity, transform;
            opacity: 1;
        }

        .lock-screen.hiding {
            animation: lockScreenOut 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes lockScreenOut {
            0% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
            100% {
                opacity: 0;
                transform: scale(1.08) translateY(-20px);
            }
        }

        .lock-screen.hidden {
            display: none;
        }

        /* Dashboard slide in - HIDDEN initially */
        .header, .welcome-screen, .chat-container, .input-area {
            will-change: transform, opacity;
            opacity: 0;
            visibility: hidden;
        }

        .dashboard-enter {
            animation: dashboardIn 0.25s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            visibility: visible;
        }

        @keyframes dashboardIn {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lock-screen .lock-icon {
            font-size: 72px;
            margin-bottom: 40px;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
            color: #FFFFFF;
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .quote-text {
            opacity: 0.5;
        }

        .quote-text .cursor {
            display: inline-block;
            width: 2px;
            height: 14px;
            background: #FFFFFF;
            margin-left: 2px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        .lock-screen h3 {
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
            margin-bottom: 35px;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.3px;
            line-height: 1.7;
            opacity: 0.9;
            max-width: 340px;
            text-align: center;
        }

        .lock-screen input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 16px 24px;
            font-size: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
            color: #FFFFFF;
            text-align: center;
            width: 200px;
            letter-spacing: 12px;
            outline: none;
            transition: all 0.3s ease;
        }

        /* PIN Dots */
        .pin-dots {
            display: flex;
            gap: 16px;
            margin-bottom: 30px;
        }

        .pin-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            transition: all 0.15s ease;
        }

        .pin-dot.filled {
            background: #FFFFFF;
            border-color: #FFFFFF;
        }

        /* Numpad */
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 280px;
        }

        .numpad-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: none;
            color: #FFFFFF;
            font-size: 26px;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .numpad-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .numpad-btn:active {
            background: rgba(255,255,255,0.25);
            transform: scale(0.95);
        }

        .numpad-btn.numpad-empty {
            background: transparent;
            cursor: default;
        }

        .numpad-btn.numpad-delete {
            font-size: 22px;
        }

        .lock-screen .submit-btn {
            margin-top: 40px;
            background: transparent;
            color: #FFFFFF;
            border: 1px solid rgba(255,255,255,0.25);
            padding: 16px 32px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 2px;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
            cursor: pointer;
            max-width: 340px;
            line-height: 1.8;
            text-align: center;
            transition: all 0.3s ease;
        }

        .lock-screen .submit-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.5);
            transform: scale(1.02);
        }

        .lock-screen .submit-btn:active {
            transform: scale(0.98);
        }

        .lock-screen::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 70%);
            pointer-events: none;
        }


        /* Loading indicator - bottom */
        .loading-indicator {
            display: none;
            position: fixed;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            align-items: center;
            justify-content: center;
            padding: 6px 14px;
            gap: 5px;
            background: var(--wa-bg);
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 100;
        }
        .loading-indicator.active { display: flex; }
        .loading-indicator .dot {
            width: 6px;
            height: 6px;
            background: var(--wa-text-dim);
            border-radius: 50%;
            animation: pulse-dot 1s infinite;
        }
        .loading-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }

    </style>
</head>
<body>
    <!-- PIN Lock Screen -->
    <div class="lock-screen hidden" id="lockScreen">
        <div class="lock-icon">λ</div>
        <h3><span id="quoteText"></span></h3>
        <div class="pin-dots" id="pinDots">
            <span class="pin-dot"></span>
            <span class="pin-dot"></span>
            <span class="pin-dot"></span>
            <span class="pin-dot"></span>
        </div>
        <div class="numpad">
            <button class="numpad-btn" onclick="addPin('1')">1</button>
            <button class="numpad-btn" onclick="addPin('2')">2</button>
            <button class="numpad-btn" onclick="addPin('3')">3</button>
            <button class="numpad-btn" onclick="addPin('4')">4</button>
            <button class="numpad-btn" onclick="addPin('5')">5</button>
            <button class="numpad-btn" onclick="addPin('6')">6</button>
            <button class="numpad-btn" onclick="addPin('7')">7</button>
            <button class="numpad-btn" onclick="addPin('8')">8</button>
            <button class="numpad-btn" onclick="addPin('9')">9</button>
            <button class="numpad-btn numpad-empty"></button>
            <button class="numpad-btn" onclick="addPin('0')">0</button>
            <button class="numpad-btn numpad-delete" onclick="deletePin()">⌫</button>
        </div>
        <button class="submit-btn" onclick="submitPin()">BUKA</button>
    </div>

    <!-- Header -->
    <div class="header">
        <button class="header-back" id="headerBack" onclick="goBack()">‹</button>
        <div class="header-avatar"><img src="https://raw.githubusercontent.com/Aphelios01-sdk/chat-app/main/android/www/saved_images/img_114971a3e80b.jpg" alt="AI Avatar"></div>
        <div class="header-info">
            <div class="name">Make Your Work Easier</div>
            <div class="status" id="statusText">online</div>
        </div>

    </div>

    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <img src="https://raw.githubusercontent.com/Aphelios01-sdk/chat-app/main/android/www/saved_images/img_114971a3e80b.jpg" class="welcome-icon" alt="AI">
        <h2>Make Your Work Easier</h2>
        <p>L = Σ(y - y_pred)² + λ Σ(w²)</p>
        <button class="start-btn" onclick="startChat()">Mulai Chat</button>
    </div>

    <!-- Chat Container -->
    <div class="chat-container" id="chatContainer">
    </div>

    <!-- Loading Indicator -->
    <div class="loading-indicator" id="loadingIndicator">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <!-- Input Area -->
    <div class="input-area" id="inputArea">
        <div class="input-wrapper">
            <button class="emoji-btn" id="emojiBtn" onclick="toggleSkillsPopup()">≡</button>
            <textarea id="messageInput" placeholder="Ketik pesan..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
        </div>

        <!-- Skills Popup - inside input-area for natural positioning -->
        <div class="skills-popup" id="skillsPopup">
            <div class="skills-popup-header">
                <span>Skills</span>
                <button class="skills-popup-close" onclick="closeSkillsPopup()">X</button>
            </div>
            <div class="skills-popup-list" id="skillsPopupList">
                <div class="skills-popup-loading">Loading skills...</div>
            </div>
        </div>
    </div>

    <!-- Skills Overlay - outside so it covers full screen -->
    <div class="skills-popup-overlay" id="skillsOverlay" onclick="closeSkillsPopup()"></div>

    <script>
        // ===== SECURE PIN SYSTEM - Server-side verification =====
        let isLocked = false;
        let failedAttempts = 0;
        let lockoutUntil = null;
        let pin = '';

        function addPin(digit) {
            if (pin.length < 4) {
                pin += digit;
                updatePinDots();
                if (pin.length === 4) {
                    setTimeout(submitPin, 100);
                }
            }
        }

        function deletePin() {
            if (pin.length > 0) {
                pin = pin.slice(0, -1);
                updatePinDots();
            }
        }

        function updatePinDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, i) => {
                if (i < pin.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });
        }

        async function submitPin() {
            if (lockoutUntil && Date.now() < lockoutUntil) {
                return;
            }

            try {
                const resp = await fetch('http://43.156.57.226/api/verify-pin', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({pin: pin})
                });
                const data = await resp.json();

                if (data.success) {
                    isLocked = false;
                    const lockScreen = document.getElementById('lockScreen');
                    lockScreen.classList.add('hiding');
                    setTimeout(() => {
                        lockScreen.classList.add('hidden');
                        lockScreen.classList.remove('hiding');
                        document.querySelector('.header').classList.add('dashboard-enter');
                        document.querySelector('.welcome-screen').classList.add('dashboard-enter');
                        document.querySelector('.chat-container').classList.add('dashboard-enter');
                        document.querySelector('.input-area').classList.add('dashboard-enter');
                    }, 800);
                } else {
                    failedAttempts++;
                    const dots = document.querySelectorAll('.pin-dot');
                    dots.forEach(dot => {
                        dot.style.animation = 'none';
                        dot.offsetHeight;
                        dot.style.animation = 'shake 0.5s ease';
                    });
                    pin = '';
                    updatePinDots();

                    if (data.locked) {
                        lockoutUntil = Date.now() + data.remaining_seconds * 1000;
                        alert('Terlalu banyak percobaan salah. Kunci selama ' + Math.ceil(data.remaining_seconds/60) + ' menit.');
                    } else if (data.attempts_left !== undefined) {
                        alert('PIN salah. Sisa percobaan: ' + data.attempts_left);
                    }
                }
            } catch(e) {
                alert('Verifikasi gagal: ' + e.message);
            }
        }

        // ===== AUDIO SYSTEM - Notification Sound =====
        let audioContext = null;

        function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {
                console.log('Web Audio not supported:', e);
            }
        }

        // Resume AudioContext on user interaction (browser policy)
        function resumeAudio() {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        // Web Audio API oscillator notification sound (WA-like pop)
        function playNotificationSound() {
            resumeAudio();
            if (!audioContext) {
                initAudio();
            }
            if (!audioContext) return;
            
            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            } catch(e) {
                console.log('Audio playback error:', e);
            }
        }

        // Android native notification sound via ToneGenerator bridge
        function playNativeSound() {
            if (window.AndroidBridge && window.AndroidBridge.playTone) {
                try {
                    window.AndroidBridge.playTone('notification', 800, 300);
                } catch(e) {
                    console.log('AndroidBridge error:', e);
                }
            }
        }

        // Initialize audio on first user interaction
        document.addEventListener('click', initAudio, { once: true });
        document.addEventListener('touchstart', initAudio, { once: true });


        // Quote typing animation
        const quote = '"Your work is going to fill a large part of your life… the only way to be truly satisfied is to do what you believe is great work." — Steve Jobs';
        let charIndex = 0;
        const quoteElement = document.getElementById('quoteText');

        function typeQuote() {
            if (charIndex < quote.length) {
                quoteElement.innerHTML = quote.substring(0, charIndex + 1) + '<span class="cursor"></span>';
                charIndex++;
                setTimeout(typeQuote, 20);
            } else {
                quoteElement.innerHTML = quote;
            }
        }

        // Start typing animation when page loads
        setTimeout(typeQuote, 500);

        // Rate limiting
        let messageTimestamps = [];
        const RATE_LIMIT = 10; // max messages
        const RATE_WINDOW = 60000; // per 60 seconds

        function checkRateLimit() {
            const now = Date.now();
            messageTimestamps = messageTimestamps.filter(t => now - t < RATE_WINDOW);
            if (messageTimestamps.length >= RATE_LIMIT) {
                return false;
            }
            messageTimestamps.push(now);
            return true;
        }


        // XSS Protection
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Block if locked
        function checkLock() {
            if (isLocked) {
                document.getElementById('pinInput').focus();
            }
        }

        setInterval(checkLock, 1000);

        // ===== SKILLS BAR =====
        const SKILL_ICONS = {
            'awp': '[A]', 'predict-worknet': '[P]', 'mine': '[M]',
            'github': '[GH]', 'gitlab': '[GL]', 'docker': '[D]',
            'kubernetes': '[K8]', 'linux': '[L]', 'python': '[Py]',
            'javascript': '[JS]', 'typescript': '[TS]', 'react': '[R]',
            'nodejs': '[N]', 'aws': '[AWS]', 'gcp': '[GCP]', 'azure': '[AZ]',
            'mysql': '[SQL]', 'postgres': '[PG]', 'mongodb': '[MG]',
            'redis': '[R]', 'elasticsearch': '[ES]', 'kafka': '[K]',
            'graphql': '[GQL]', 'rest': '[REST]', 'websocket': '[WS]',
            'html': '[H]', 'css': '[CSS]', 'tailwind': '[TW]',
            'git': '[G]', 'ci-cd': '[CI]', 'jenkins': '[JK]',
            'terraform': '[TF]', 'ansible': '[A]', 'prometheus': '[PM]',
            'grafana': '[G]', 'default': '[S]'
        };

        function getSkillIcon(name) {
            return SKILL_ICONS[name] || SKILL_ICONS[name.split('-')[0]] || SKILL_ICONS['default'];
        }

        function getSkillIcon(name) {
            return SKILL_ICONS[name] || SKILL_ICONS[name.split('-')[0]] || SKILL_ICONS['default'];
        }

        function loadSkills() {
            fetch('/api/skills')
                .then(r => r.json())
                .then(skills => {
                    // Only show tools (non-hermes category)
                    const tools = skills.filter(s => s.category !== 'hermes');
                    populateSkillsPopup(tools);
                })
                .catch(() => {
                    document.getElementById('skillsPopupList').innerHTML = '<div class="skills-popup-error">Error loading skills</div>';
                });
        }

        // Skills Popup Functions
        function toggleSkillsPopup() {
            loadSkills(); // Load skills when popup opens
            const popup = document.getElementById('skillsPopup');
            const overlay = document.getElementById('skillsOverlay');
            if (popup.classList.contains('active')) {
                closeSkillsPopup();
            } else {
                popup.classList.add('active');
                overlay.classList.add('active');
            }
        }

        function closeSkillsPopup() {
            document.getElementById('skillsPopup').classList.remove('active');
            document.getElementById('skillsOverlay').classList.remove('active');
        }

        function populateSkillsPopup(skills) {
            const list = document.getElementById('skillsPopupList');
            if (!skills || skills.length === 0) {
                list.innerHTML = '<div class="skills-popup-error">No skills found</div>';
                return;
            }
            list.innerHTML = skills.map(skill => `
                <div class="skills-popup-item" onclick="selectSkill('${escapeHtml(skill.name)}')">
                    <div class="skill-info">
                        <div class="skill-name">${escapeHtml(skill.name)}</div>
                        <div class="skill-desc">${escapeHtml(skill.desc || '')}</div>
                    </div>
                </div>
            `).join('');
        }

        function selectSkill(skillName) {
            const input = document.getElementById('messageInput');
            input.value = `/skill ${skillName} `;
            input.focus();
            closeSkillsPopup();
        }

        // Load skills on page load
        setTimeout(loadSkills, 500);

        // ===== CHAT APP =====
        let messages = [];
        let ws = null;
        let connected = false;
        let streamBuffer = '';
        let streamingMessageId = null;

        // Get today's date string
        function getDateString() {
            const today = new Date();
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            return today.toLocaleDateString('id-ID', options);
        }

        // Get time string
        function getTimeString() {
            return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        }

        // Add date divider
        function addDateDivider() {
            const container = document.getElementById('chatContainer');
            const divider = document.createElement('div');
            divider.className = 'date-divider';
            divider.innerHTML = `<span>${getDateString()}</span>`;
            container.appendChild(divider);
        }

        // Add message to chat
        function addMessage(text, type = 'recv', sender = 'Make Your Work Easier') {
            const container = document.getElementById('chatContainer');
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${type}`;

            const time = getTimeString();

            if (type === 'recv' && sender !== 'Make Your Work Easier') {
                wrapper.innerHTML = `
                    <div class="message recv">
                        <div class="sender">${sender}</div>
                        <div class="text">${escapeHtml(text)}</div>
                        <div class="meta">${time}</div>
                    </div>
                `;
            } else {
                wrapper.innerHTML = `
                    <div class="message ${type}">
                        <div class="text">${escapeHtml(text)}</div>
                        <div class="meta">
                            <span>${time}</span>
                            ${type === 'sent' ? '<span class="read-status">✓✓</span>' : ''}
                        </div>
                    </div>
                `;
            }

            container.appendChild(wrapper);
            requestAnimationFrame(() => {
                container.scrollTo({
                    top: container.scrollHeight,
                    behavior: 'smooth'
                });
            });

            messages.push({ text, type, sender, time });
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Update streaming message in real-time
        function updateStreamingMessage(text) {
            const container = document.getElementById('chatContainer');
            let streamingMsg = container.querySelector('.streaming-message');
            
            if (!streamingMsg) {
                // Create new streaming message bubble
                const wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper recv';
                
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message streaming-message';
                msgDiv.textContent = text;
                
                wrapper.appendChild(msgDiv);
                container.appendChild(wrapper);
                streamingMessageId = wrapper;
            } else {
                // Update existing streaming message
                streamingMsg.textContent = text;
            }
            
            // Auto-scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        // Show choice buttons below last message
        function showChoices(choices) {
            const container = document.getElementById('chatContainer');
            const lastWrapper = container.lastElementChild;
            if (!lastWrapper) return;

            const choicesDiv = document.createElement('div');
            choicesDiv.className = 'choice-buttons';
            choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice.label;
                btn.onclick = () => {
                    // Remove choice buttons
                    choicesDiv.remove();
                    // Send the selected value
                    const input = document.getElementById('messageInput');
                    input.value = choice.value;
                    sendMessage();
                };
                choicesDiv.appendChild(btn);
            });
            lastWrapper.appendChild(choicesDiv);
        }

        // Auto resize textarea
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 100) + 'px';
        }

        // Handle enter key
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // Start chat
        function goBack() {
            hideTyping();
            const welcome = document.getElementById('welcomeScreen');
            welcome.style.display = 'flex';
            welcome.classList.remove('hidden');
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
            document.getElementById('headerBack').classList.remove('visible');
            const input = document.getElementById('messageInput');
            input.value = '';
            hideSkillsPopup();
        }

        function startChat() {
            const welcome = document.getElementById('welcomeScreen');
            welcome.classList.add('hidden');
            document.getElementById('headerBack').classList.add('visible');
            // Make chat UI visible
            document.querySelector('.header').classList.add('dashboard-enter');
            document.querySelector('.chat-container').classList.add('dashboard-enter');
            document.querySelector('.input-area').classList.add('dashboard-enter');
            // After animation, set display:none
            setTimeout(() => {
                welcome.style.display = 'none';
            }, 400);
            addDateDivider();
            addMessage("Press /start when you want to start, remember the chat will be deleted if you close the tab or apk (still in beta stage)", 'recv');
            // Put /start in input field for manual send
            const input = document.getElementById('messageInput');
            input.value = '/start';
            input.focus();
        }

        // Send message
        function sendMessage() {
            if (isLocked) return;

            if (!checkRateLimit()) {
                addMessage('⚠️ Terlalu banyak pesan. Tunggu sebentar.', 'recv');
                return;
            }

            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (!text) return;

            // Add user message
            addMessage(text, 'sent');
            input.value = '';
            input.style.height = 'auto';

            // Show typing indicator
            showTyping();

            // Send to AI
            sendToAI(text);
        }

        function showTyping() { document.getElementById('loadingIndicator').classList.add('active'); }
        function hideTyping() { document.getElementById('loadingIndicator').classList.remove('active'); }

        // Send message to AI backend
        function sendToAI(text) {
            // Connect to WebSocket if not connected
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                connectWS(text);
            } else {
                ws.send(JSON.stringify({
                    type: 'chat',
                    message: text
                }));
            }
        }

        // Connect to WebSocket
        function connectWS(initialMessage = null) {
            const wsUrl = `wss://lambdachatvps.loca.lt/ws`;

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    connected = true;
                    document.getElementById('statusText').textContent = 'online';
                    if (initialMessage) {
                        ws.send(JSON.stringify({
                            type: 'chat',
                            message: initialMessage
                        }));
                    }
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        
                        if (data.type === 'typing') {
                            if (data.status === 'start') {
                                showTyping();
                            } else {
                                hideTyping();
                            }
                        } else if (data.type === 'stream') {
                            // Stream response in real-time
                            hideTyping(); // Hide loading indicator when stream starts
                            streamBuffer += data.chunk;
                            updateStreamingMessage(streamBuffer);
                        } else if (data.type === 'response') {
                            // Final response
                            playNotificationSound();
                            addMessage(data.message, 'recv');
                            streamBuffer = '';
                            // Show choice buttons if provided
                            if (data.choices && data.choices.length > 0) {
                                showChoices(data.choices);
                            }
                        } else if (data.type === 'error') {
                            addMessage('Maaf, terjadi kesalahan. Coba lagi ya.', 'recv');
                        }
                    } catch {
                        playNotificationSound();
                        addMessage(event.data, 'recv');
                    }
                };

                ws.onclose = () => {
                    connected = false;
                    document.getElementById('statusText').textContent = 'offline';
                    // Try to reconnect after 3 seconds
                    setTimeout(() => connectWS(), 3000);
                };

                ws.onerror = () => {
                    hideTyping();
                    // If WS not available, use fetch API
                    useFetchAPI(initialMessage);
                };

                ws.onclose = () => {
                    connected = false;
                    document.getElementById('statusText').textContent = 'offline';
                    // Don't auto-reconnect - use HTTP fallback instead
                };
            } catch (e) {
                hideTyping();
                useFetchAPI(initialMessage);
            }
        }

        // Fallback: Use fetch API (always use absolute URL to VPS)
        const API_BASE = 'https://lambdachatvps.loca.lt';
        function useFetchAPI(message) {
            fetch(API_BASE + '/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            })
            .then(r => r.json())
            .then(d => {
                hideTyping();
                playNotificationSound();
                addMessage(d.response || d.reply || 'Maaf, saya tidak bisa menjawab sekarang.', 'recv');
            })
            .catch(() => {
                hideTyping();
                addMessage('Maaf, terjadi kesalahan koneksi. Silakan coba lagi.', 'recv');
            });
        }

        // Clear chat
        function clearChat() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
            messages = [];
            addDateDivider();
            addMessage("Chat cleared. 👋\n\nAda yang bisa saya bantu lagi?", 'recv');
        }

        // Debug: check what elements exist
        try {
            console.log('lockScreen:', document.getElementById('lockScreen'));
            console.log('welcomeScreen:', document.getElementById('welcomeScreen'));
            console.log('chatContainer:', document.getElementById('chatContainer'));
            console.log('messageInput:', document.getElementById('messageInput'));
        } catch(e) {
            alert('JS Error: ' + e.message);
        }

        // Scroll to bottom on load
        document.getElementById('chatContainer').scrollTop = 0;

        // Prevent right-click context menu (security)
        // document.addEventListener('contextmenu', e => e.preventDefault());

        // DEBUG: show welcome screen always (for testing)
        try {
            const lock = document.getElementById('lockScreen');
            if (lock) lock.classList.add('hidden');
            const welcome = document.getElementById('welcomeScreen');
            if (welcome) {
                welcome.classList.remove('hidden');
                welcome.classList.add('dashboard-enter');
            }
        } catch(e) {
            alert('Setup error: ' + e.message);
        }
    </script>
</body>
