<!DOCTYPE html>
<html>
<head>
<title>Mini Test</title>
<style>
.welcome-screen { background: #0a0; color: #fff; padding: 20px; text-align: center; }
.welcome-screen.hidden { display: none !important; }
.chat-container { background: #00a; color: #fff; padding: 20px; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="welcomeScreen" class="welcome-screen">
  <h1>WELCOME - TAP MULAI CHAT</h1>
</div>
<div id="chatContainer" class="chat-container" style="display:none">
  <h1>CHAT AREA</h1>
  <div id="messages"></div>
  <input type="text" id="messageInput" value="/start">
  <button onclick="sendMessage()">SEND</button>
</div>

<script>
let ws;
function startChat() {
  document.getElementById('welcomeScreen').classList.add('hidden');
  document.getElementById('chatContainer').style.display = 'block';
}
function sendMessage() {
  const text = document.getElementById('messageInput').value;
  document.getElementById('messages').innerHTML += '<div style="color:yellow">SENT: ' + text + '</div>';
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    connectWS(text);
  }
}
function connectWS(initial) {
  ws = new WebSocket('ws://43.156.57.226/ws');
  ws.onopen = () => {
    document.getElementById('messages').innerHTML += '<div style="color:green">WS CONNECTED</div>';
    if (initial) ws.send(JSON.stringify({type:'chat',message:initial}));
  };
  ws.onmessage = (e) => {
    document.getElementById('messages').innerHTML += '<div style="color:cyan">RESP: ' + e.data.substring(0,100) + '</div>';
  };
  ws.onerror = () => document.getElementById('messages').innerHTML += '<div style="color:red">WS ERROR</div>';
}
</script>
<button onclick="startChat()">MULAI CHAT</button>
</body>
</html>
