<!DOCTYPE html>
<html>
<head>
<title>Chat Test</title>
<style>
body { font-family: sans-serif; margin: 0; padding: 20px; background: #000; color: #fff; }
.chat-container { border: 1px solid #333; height: 400px; overflow-y: auto; padding: 10px; }
.msg { padding: 8px; margin: 4px 0; border-radius: 8px; }
.sent { background: #fff; color: #000; text-align: right; }
.recv { background: #333; }
input { width: 70%; padding: 10px; }
button { padding: 10px 20px; }
</style>
</head>
<body>
<h3>Chat Test</h3>
<div id="chatContainer" class="chat-container"></div>
<br>
<input type="text" id="msgInput" placeholder="Ketik pesan...">
<button onclick="addMsg()">Send</button>

<script>
// Test: does addMessage work at all?
function addMessage(text, type) {
    var container = document.getElementById('chatContainer');
    var div = document.createElement('div');
    div.className = 'msg ' + type;
    div.textContent = '[' + type + '] ' + text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    console.log('addMessage called:', text, type, 'childCount:', container.children.length);
}

// Add initial messages
addMessage('Welcome! Chat is working.', 'recv');
addMessage('Try typing below', 'recv');

// Test send
function addMsg() {
    var input = document.getElementById('msgInput');
    var text = input.value.trim();
    if (!text) return;
    addMessage(text, 'sent');
    input.value = '';
    addMessage('This is an auto-reply from AI', 'recv');
}
</script>
</body>
</html>
