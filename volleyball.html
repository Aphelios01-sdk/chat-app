<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stickman Volleyball</title>
  <script>p5.disableFriendlyErrors = true;</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// === Stickman Volleyball Animation ===
// Two stickmen playing volleyball, ball arcs toward OPEN button

const W = window.innerWidth;
const H = window.innerHeight;

let phase = 0;
let ballTrail = [];

const LOOP_DURATION = 180; // frames per cycle

function setup() {
  createCanvas(W, H);
  frameRate(30);
}

function draw() {
  background(0);
  
  const t = (frameCount % LOOP_DURATION) / LOOP_DURATION;
  phase = t * TWO_PI;
  
  // Draw net in the middle-upper area
  drawNet(W/2, H * 0.25, 120);
  
  // Draw left stickman
  drawStickman(W * 0.25, H * 0.65, false, t);
  
  // Draw right stickman
  drawStickman(W * 0.75, H * 0.65, true, t);
  
  // Draw ball with trajectory
  drawBall(t);
  
  // Ground
  stroke('rgba(255,255,255,0.06)');
  strokeWeight(1);
  line(W * 0.1, H * 0.78, W * 0.9, H * 0.78);
}

function drawNet(x, y, height) {
  stroke('rgba(255,255,255,0.1)');
  strokeWeight(1);
  // Posts
  line(x, y, x, y + height);
  // Net mesh
  for (let i = 0; i < 8; i++) {
    const ny = y + (i / 8) * height;
    line(x - 30, ny, x + 30, ny);
  }
  // Net top
  strokeWeight(2);
  line(x - 35, y, x + 35, y);
}

function drawStickman(x, y, facingRight, t) {
  push();
  translate(x, y);
  if (!facingRight) scale(-1, 1);
  
  stroke('rgba(255,255,255,0.2)');
  strokeWeight(2);
  noFill();
  
  // Bounce animation
  const bounce = abs(sin(t * TWO_PI * 1.5)) * 5;
  
  // Head
  ellipse(0, -45 - bounce, 18, 18);
  
  // Body
  line(0, -36 - bounce, 0, -5);
  
  // Arms hitting animation
  const hitPhase = sin(t * TWO_PI * 1.5);
  const armUp = hitPhase > 0 ? hitPhase * 0.8 : 0;
  
  // Back arm
  push();
  translate(0, -30 - bounce);
  rotate(-0.4 + armUp * 0.5);
  line(0, 0, -18, 12);
  pop();
  
  // Front arm (hitting)
  push();
  translate(0, -30 - bounce);
  rotate(0.4 - armUp * 1.2);
  line(0, 0, 18, 12);
  pop();
  
  // Legs - slight movement
  const legSwing = sin(t * TWO_PI * 1.5) * 0.15;
  
  push();
  translate(0, -5);
  rotate(-legSwing);
  line(0, 0, -10, 22);
  pop();
  
  push();
  translate(0, -5);
  rotate(legSwing);
  line(0, 0, 10, 22);
  pop();
  
  pop();
}

function drawBall(t) {
  // Ball trajectory - figure 8 like pattern over net
  const netY = H * 0.25;
  const netX = W / 2;
  
  let ballX, ballY;
  const ballSize = 10;
  
  // Simplified: ball goes in arc from one side, lands toward bottom (OPEN button direction)
  if (t < 0.4) {
    // Serve - ball goes up from left
    const progress = t / 0.4;
    ballX = lerp(W * 0.25, W * 0.5, progress);
    const arc = sin(progress * PI);
    ballY = netY + 80 - arc * 100;
  } else if (t < 0.7) {
    // Ball crossing over net toward right
    const progress = (t - 0.4) / 0.3;
    ballX = lerp(W * 0.5, W * 0.75, progress);
    const arc = sin(progress * PI);
    ballY = netY + 80 - arc * 60;
  } else {
    // Ball coming down toward OPEN button area
    const progress = (t - 0.7) / 0.3;
    ballX = lerp(W * 0.75, W * 0.65, progress);
    ballY = lerp(netY + 20, H * 0.85, progress * progress);
  }
  
  // Add to trail
  ballTrail.push({ x: ballX, y: ballY, t: t });
  if (ballTrail.length > 12) ballTrail.shift();
  
  // Draw trail
  noStroke();
  for (let i = 0; i < ballTrail.length; i++) {
    const alpha = (i / ballTrail.length) * 0.15;
    const size = ballSize * (i / ballTrail.length) * 0.8;
    fill(`rgba(255,255,255,${alpha})`);
    ellipse(ballTrail[i].x, ballTrail[i].y, size);
  }
  
  // Ball glow
  for (let i = 3; i > 0; i--) {
    fill(`rgba(255,255,255,${0.03 * i})`);
    ellipse(ballX, ballY, ballSize + i * 12);
  }
  
  // Ball
  fill('rgba(255,255,255,0.5)');
  stroke('rgba(255,255,255,0.3)');
  strokeWeight(1);
  ellipse(ballX, ballY, ballSize);
  
  // Ball highlight
  noStroke();
  fill('rgba(255,255,255,0.4)');
  ellipse(ballX - 2, ballY - 2, ballSize * 0.35);
  
  // Direction indicator when ball is heading toward OPEN
  if (t > 0.65) {
    const progress = (t - 0.65) / 0.35;
    stroke('rgba(255,255,255,0.1)');
    strokeWeight(1);
    for (let i = 1; i <= 3; i++) {
      const lineY = ballY + i * 15 * progress;
      const lineAlpha = 0.1 * (1 - i / 4);
      stroke(`rgba(255,255,255,${lineAlpha})`);
      line(ballX - 8 + i * 2, lineY, ballX + 8 - i * 2, lineY);
    }
  }
}

function windowResized() {
  resizeCanvas(window.innerWidth, window.innerHeight);
}

function keyPressed() {
  if (key === 's' || key === 'S') saveCanvas('volleyball', 'png');
}
</script>
</body>
</html>
